    <div class="spinner d-none" id="spinner">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <div class="backdrop d-none" id="backdrop"></div>
    <div class="container mt-5">
        <div class="d-flex justify-content-between">
            <div class="logo-img">
                <img src="./assets/images/logo.svg" alt="logo-img">
            </div>

            <div><button id="addMovie" class="btn btn-danger">ADD MOVIE</button></div>
        </div>
    </div>

    <div class="container mt-5">

        <div class="col-md-8 offset-md-2">


            <form id="movieForm" class="d-none">
                <div id="movieform" class="card" style="padding: 34px;">
                    <div class="card-header d-flex justify-content-between">
                        <h4>MOVIE FORM</h4>

                        <div id="closeBtn" style="cursor: pointer;"><i class="fa-solid fa-xmark"></i></div>
                    </div>
                    <div class="form-group">
                        <label for="movieTitle">MOVIE TITLE*</label>
                        <input type="text" name="title" id="title" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="movieImage">MOVIE IMAGE*</label>
                        <input type="text" alt="" id="image" class="form-control"
                            placeholder="please send Image url............." required>
                    </div>


                    <div class="form-group">
                        <label for="movieDescription">MOVIE DESCRIPTION*</label>
                        <textarea name="Description" id="description" rows="" class="form-control" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="movieRating">MOVIE RATING*</label>
                        <select name="movieRating" id="rating" class="form-control" required>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                        </select>
                    </div>
                    <br>
                    <button id="addMovieBtn" class="btn btn-primary form-control" type="submit">ADD BTN</button>
                    <button id="updateMovieBtn" class="d-none btn btn-warning form-control" type="button">UPDATE
                        BTN</button>
            </form>
        </div>

    </div>
